<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#1d3a5f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Laissez les Fers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root{--navy:#1d3a5f;--navy2:#254a78;--or:#ff8f00;--bl:#1565c0;--gn:#2e7d32;--mist:#e8eaf6;--waze:#33ccff;--r:14px;--sh:0 2px 12px rgba(0,0,0,.10);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#f0f2f9;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;min-height:100dvh;padding-bottom:90px;}
    .topbar{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:10px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.3);}
    .topbar img{height:136px;width:auto;object-fit:contain;display:block;}
    .topbar-meta{text-align:right;color:rgba(255,255,255,.8);font-size:11px;line-height:1.6;}
    .syncbar{background:#12254a;padding:5px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.7);}
    .dot{width:7px;height:7px;border-radius:50%;background:#777;flex-shrink:0;transition:background .3s;}
    .dot.ok{background:#69f0ae;}.dot.err{background:#ff5252;}.dot.spin{background:#ffeb3b;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .plan-section{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 14px;}
    .plan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
    .plan-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:#999;}
    .plan-nav{display:flex;align-items:center;gap:6px;}
    .pnav-btn{width:26px;height:26px;border-radius:8px;border:none;background:var(--mist);color:var(--navy);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .pnav-btn:active{background:var(--navy);color:#fff;}
    .pnav-label{font-size:11px;font-weight:700;color:var(--navy);min-width:120px;text-align:center;}
    .pnav-today{font-size:10px;font-weight:700;color:var(--navy);background:var(--mist);border:none;border-radius:8px;padding:5px 10px;cursor:pointer;}
    .pnav-today:active{background:var(--navy);color:#fff;}
    .week-grid{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
    .week-grid::-webkit-scrollbar{display:none;}
    .day-col{flex-shrink:0;width:150px;border-radius:12px;background:#f8f9ff;border:1.5px solid #e8eaf6;overflow:hidden;}
    .day-col.is-today{border-color:var(--navy);background:#eef1ff;}
    .day-head{padding:7px 10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#789;border-bottom:1px solid #e8eaf6;display:flex;justify-content:space-between;align-items:center;}
    .day-col.is-today .day-head{color:var(--navy);}
    .day-body{padding:6px;display:flex;flex-direction:column;gap:6px;min-height:40px;}
    .day-empty{font-size:10px;color:#bbb;text-align:center;padding:8px 0;}
    .day-item{border-radius:9px;padding:6px 8px;font-size:11px;}
    .day-item.dc{background:#fff3e0;border:1px solid #ffcc80;}
    .day-item.dl{background:#e3f2fd;border:1px solid #90caf9;}
    .day-item .di-time{font-weight:800;font-size:11px;}
    .day-item.dc .di-time{color:var(--or);}.day-item.dl .di-time{color:var(--bl);}
    .day-item .di-name{font-weight:700;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
    .day-item .di-row{display:flex;align-items:center;justify-content:space-between;gap:4px;}
    .di-waze{flex-shrink:0;width:20px;height:20px;border-radius:6px;background:var(--waze);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;text-decoration:none;}
    .plan-empty{font-size:13px;color:#bbb;text-align:center;padding:6px 0;}
    .plan-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
    .plan-scroll::-webkit-scrollbar{display:none;}
    .plan-chip{flex-shrink:0;border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:8px;max-width:210px;}
    .plan-chip.pc{background:#fff3e0;border:1.5px solid #ffcc80;}.plan-chip.pl{background:#e3f2fd;border:1.5px solid #90caf9;}
    .pname{font-size:13px;font-weight:800;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .plbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
    .plan-chip.pc .plbl{color:var(--or);}.plan-chip.pl .plbl{color:var(--bl);}
    .plan-waze{width:28px;height:28px;border-radius:8px;background:var(--waze);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;text-decoration:none;flex-shrink:0;}
    .filters{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:#f8f9ff;border-bottom:1px solid #e0e0e0;position:sticky;top:156px;z-index:40;}
    .filters::-webkit-scrollbar{display:none;}
    .ftab{flex-shrink:0;border:2px solid transparent;background:var(--mist);color:var(--navy);font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .18s;}
    .ftab.active{background:var(--navy);color:#fff;}
    .ftab .cnt{font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px;background:#3949ab;color:#fff;}
    .ftab.active .cnt{background:rgba(255,255,255,.28);}
    .statsbar{display:flex;gap:8px;padding:12px 14px;}
    .spill{flex:1;background:#fff;border-radius:12px;padding:10px 8px;text-align:center;box-shadow:var(--sh);}
    .snum{font-size:26px;font-weight:900;line-height:1;}
    .slbl{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
    .spill.c .snum{color:var(--or);}.spill.l .snum{color:var(--bl);}
    #cards{padding:14px 14px 0;display:flex;flex-direction:column;gap:12px;}
    .card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border-left:5px solid transparent;animation:fs .25s ease both;}
    .card.sc{border-left-color:var(--or);}.card.sl{border-left-color:var(--bl);}.card.st{border-left-color:var(--gn);opacity:.78;}
    @keyframes fs{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .card-head{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 6px;gap:8px;}
    .cname{font-size:16px;font-weight:800;color:var(--navy);}
    .cbags{font-size:12px;color:#789;margin-top:2px;}
    .sbadge{flex-shrink:0;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;}
    .sbadge.bc{background:#fff3e0;color:var(--or);}.sbadge.bl{background:#e3f2fd;color:var(--bl);}.sbadge.bt{background:#e8f5e9;color:var(--gn);}
    .card-addr{display:flex;align-items:center;gap:8px;padding:0 14px 6px;}
    .addr-txt{font-size:12px;color:#567;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .waze-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--waze);color:#fff;font-size:11px;font-weight:900;padding:5px 10px;border-radius:8px;text-decoration:none;white-space:nowrap;}
    .waze-btn:active{opacity:.8;color:#fff;}
    .card-dates{display:flex;gap:6px;padding:0 14px 10px;flex-wrap:wrap;}
    .dchip{font-size:11px;background:var(--mist);color:#456;padding:4px 10px;border-radius:8px;}
    .dchip.ov{background:#fff3e0;color:#bf360c;font-weight:700;}
    .card-actions{border-top:1px solid #f0f0f0;display:flex;align-items:center;padding:8px 10px;gap:6px;}
    .sbtn{flex:1;font-size:11px;font-weight:700;border:2px solid;border-radius:10px;padding:7px 4px;cursor:pointer;background:#fff;text-align:center;transition:all .15s;}
    .sbtn.bc2{border-color:var(--or);color:var(--or);}.sbtn.bl2{border-color:var(--bl);color:var(--bl);}.sbtn.bt2{border-color:var(--gn);color:var(--gn);}
    .sbtn.abc{background:var(--or);color:#fff;}.sbtn.abl{background:var(--bl);color:#fff;}.sbtn.abt{background:var(--gn);color:#fff;}
    .ibtn{width:34px;height:34px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
    .ibtn.ed{background:#f3f4f6;color:#3949ab;}.ibtn.dl{background:#fef2f2;color:#c62828;}
    .ibtn:active{transform:scale(.92);}
    #empty{text-align:center;padding:60px 20px;color:#aaa;}
    .eico{font-size:48px;margin-bottom:16px;}
    .fab{position:fixed;bottom:24px;right:20px;width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--navy),#3949ab);color:#fff;font-size:22px;border:none;box-shadow:0 4px 18px rgba(29,58,95,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s;}
    .fab:active{transform:scale(.92);}
    .modal-wrap{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;justify-content:center;}
    .modal-wrap.open{display:flex;}
    .mbg{position:absolute;inset:0;background:rgba(10,10,30,.5);}
    .mcard{position:relative;background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92dvh;overflow-y:auto;z-index:1;animation:su .25s ease;}
    @keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
    .mhead{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:18px 20px;border-radius:20px 20px 0 0;}
    .mhead h2{color:#fff;font-size:16px;font-weight:800;}
    .mbody{padding:20px;display:flex;flex-direction:column;gap:14px;}
    .mfoot{padding:14px 20px 28px;border-top:1px solid #eee;display:flex;flex-direction:column;gap:8px;}
    .flbl{font-size:12px;font-weight:700;color:#567;display:block;margin-bottom:4px;}
    .finp{width:100%;border:2px solid #e0e0e0;border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
    .finp:focus{border-color:var(--navy);}.finp.err{border-color:#e53935;}
    .finp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-save{background:linear-gradient(135deg,var(--navy),#3949ab);color:#fff;border:none;border-radius:12px;font-weight:800;font-size:15px;padding:13px;cursor:pointer;width:100%;}
    .btn-cancel{background:#f3f4f6;color:#666;border:none;border-radius:12px;font-weight:700;font-size:14px;padding:12px;cursor:pointer;width:100%;}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 22px;border-radius:12px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    @media(min-width:480px){#cards,.statsbar,.plan-section{max-width:480px;margin-left:auto;margin-right:auto;}.filters{justify-content:center;}}
  </style>
</head>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  URL de ton Worker Cloudflare — déjà configurée          ║
// ╚══════════════════════════════════════════════════════════╝
var API = "https://llf-pressing.nicolas7lejeune.workers.dev";

// URL du Google Apps Script de sauvegarde (vide = backup désactivé)
// Colle ici l'URL obtenue après déploiement (voir backup_apps_script.gs)
var BACKUP_URL = "https://script.google.com/macros/s/AKfycbyFN2YK7knN9p7pG7PWznSQbe3tsabWM-yAKLbjV7wCLGf3KqR3VkYmRybnEiIEsfrU/exec";

// ═══════════════════════════════════════════════════════════
var clients = [];
var filter  = "all";
var pending = false;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayISO(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmtDate(iso){if(!iso)return"—";var p=iso.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:iso;}
function fmtDateTime(iso,time){var d=fmtDate(iso);if(!iso)return d;return time?d+" \u00e0 "+time:d;}
function isOv(iso,s){return iso&&s!=="termine"&&iso<todayISO();}
function wazeHref(a){return a?"https://waze.com/ul?q="+encodeURIComponent(a)+"&navigate=yes":null;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function setSyncStatus(state,msg){
  document.getElementById("dot").className="dot "+state;
  document.getElementById("slbl").textContent=msg;
}

function fetchClients(){
  setSyncStatus("spin","Chargement…");
  fetch(API+"/clients")
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
    .then(function(data){
      clients=Array.isArray(data)?data:[];
      setSyncStatus("ok","Synchronisé · "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}));
      render();
    })
    .catch(function(){setSyncStatus("err","Hors ligne — vérifier la connexion");});
}

function pushClients(){
  if(pending) return;
  pending=true;
  setSyncStatus("spin","Sauvegarde…");
  fetch(API+"/clients",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(clients)
  })
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
  .then(function(){
    pending=false;
    setSyncStatus("ok","Synchronisé · "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}));
  })
  .catch(function(){
    pending=false;
    setSyncStatus("err","Erreur de sauvegarde");
  });
  backupToSheet();
}

// Sauvegarde silencieuse vers Google Sheets (de secours, en plus de Cloudflare)
function backupToSheet(){
  if(!BACKUP_URL) return;
  fetch(BACKUP_URL,{
    method:"POST",
    mode:"no-cors", // Apps Script ne renvoie pas de CORS, mais l'écriture fonctionne
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({clients:clients})
  }).catch(function(){ /* silencieux : le backup ne doit jamais bloquer l'app */ });
}

function render(){
  var counts={collecte:0,livraison:0,termine:0};
  clients.forEach(function(c){if(counts[c.status]!==undefined)counts[c.status]++;});
  document.getElementById("ba").textContent=clients.length;
  document.getElementById("bc").textContent=counts.collecte;
  document.getElementById("bl").textContent=counts.livraison;
  document.getElementById("bt").textContent=counts.termine;
  document.getElementById("sc").textContent=counts.collecte;
  document.getElementById("sl").textContent=counts.livraison;
  document.getElementById("tc").textContent=clients.length+" client"+(clients.length>1?"s":"");
  document.getElementById("td").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
  renderPlanning();
  var f=filter==="all"?clients:clients.filter(function(c){return c.status===filter;});
  var cont=document.getElementById("cards");
  var emp=document.getElementById("empty");
  cont.innerHTML="";
  if(f.length===0){emp.style.display="block";}
  else{emp.style.display="none";f.forEach(function(c){cont.appendChild(buildCard(c));});}
}

// ── WEEK PLANNING ────────────────────────────────────────────
var weekOffset = 0; // 0 = semaine courante, -1 = semaine précédente, +1 = suivante
var DAY_NAMES = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
var MONTH_NAMES = ["janv.","f\u00e9vr.","mars","avr.","mai","juin","juil.","ao\u00fbt","sept.","oct.","nov.","d\u00e9c."];

function isoDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

function getWeekStart(offset){
  var d=new Date();
  d.setHours(0,0,0,0);
  var dow=d.getDay(); // 0=dim..6=sam
  var diffToMonday=(dow===0?-6:1-dow);
  d.setDate(d.getDate()+diffToMonday+offset*7);
  return d;
}

function renderPlanning(){
  var todayStr=todayISO();
  var weekStart=getWeekStart(weekOffset);
  var days=[];
  for(var i=0;i<7;i++){
    var d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    days.push(d);
  }

  // Label semaine (ex: "9 - 15 juin")
  var first=days[0], last=days[6];
  var label;
  if(first.getMonth()===last.getMonth()){
    label=first.getDate()+" - "+last.getDate()+" "+MONTH_NAMES[first.getMonth()];
  } else {
    label=first.getDate()+" "+MONTH_NAMES[first.getMonth()]+" - "+last.getDate()+" "+MONTH_NAMES[last.getMonth()];
  }
  document.getElementById("pnav-label").textContent=label;

  var el=document.getElementById("plan");
  var html="<div class='week-grid'>";

  days.forEach(function(d){
    var iso=isoDate(d);
    var isToday=iso===todayStr;
    var dayItems=[];
    clients.forEach(function(c){
      if(c.status==="termine")return;
      if(c.collectDate===iso) dayItems.push({c:c,type:"collecte",time:c.collectTime});
      if(c.deliverDate===iso) dayItems.push({c:c,type:"livraison",time:c.deliverTime});
    });
    // tri par heure
    dayItems.sort(function(a,b){
      if(!a.time) return 1;
      if(!b.time) return -1;
      return a.time.localeCompare(b.time);
    });

    html+="<div class='day-col"+(isToday?" is-today":"")+"'>"
      +"<div class='day-head'><span>"+DAY_NAMES[d.getDay()]+" "+d.getDate()+"</span>"+(isToday?"<span>&#8226;</span>":"")+"</div>"
      +"<div class='day-body'>";

    if(dayItems.length===0){
      html+="<div class='day-empty'>\u2014</div>";
    } else {
      dayItems.forEach(function(it){
        var c=it.c; var type=it.type; var waze=c.address?wazeHref(c.address):null;
        var icon=type==="collecte"?"&#128230;":"&#128666;";
        html+="<div class='day-item "+(type==="collecte"?"dc":"dl")+"'>"
          +"<div class='di-row'><span class='di-time'>"+icon+" "+(it.time||"--:--")+"</span>"
          +(waze?"<a class='di-waze' href='"+esc(waze)+"' target='_blank'>&#8599;</a>":"")
          +"</div><div class='di-name'>"+esc(c.name)+"</div></div>";
      });
    }
    html+="</div></div>";
  });

  html+="</div>";
  el.innerHTML=html;
}

function buildCard(c){
  var div=document.createElement("div");
  div.className="card "+(c.status==="collecte"?"sc":c.status==="livraison"?"sl":"st");
  div.dataset.id=c.id;
  var bcls=c.status==="collecte"?"bc":c.status==="livraison"?"bl":"bt";
  var slbl=c.status==="collecte"?"Collecte":c.status==="livraison"?"Livraison":"Terminé";
  var waze=c.address?wazeHref(c.address):null;
  var coOv=isOv(c.collectDate,c.status);var deOv=isOv(c.deliverDate,c.status);
  var addrRow=c.address?"<div class='card-addr'><div class='addr-txt'>&#128205; "+esc(c.address)+"</div>"+(waze?"<a class='waze-btn' href='"+esc(waze)+"' target='_blank'>&#8599; Waze</a>":"")+"</div>":"";
  var bagsLine=(c.bags&&c.bags>0)?"<div class='cbags'>&#128717; "+c.bags+" sac"+(c.bags>1?"s":"")+"</div>":"";
  var acBc=c.status==="collecte"?" abc":"";var acBl=c.status==="livraison"?" abl":"";var acBt=c.status==="termine"?" abt":"";
  div.innerHTML="<div class='card-head'><div><div class='cname'>"+esc(c.name)+"</div>"+bagsLine+"</div><span class='sbadge "+bcls+"'>"+slbl+"</span></div>"
    +addrRow
    +"<div class='card-dates'><div class='dchip"+(coOv?" ov":"")+"'>&#128197; Collecte : "+fmtDateTime(c.collectDate,c.collectTime)+"</div>"
    +"<div class='dchip"+(deOv?" ov":"")+"'>&#10003; Livraison : "+fmtDateTime(c.deliverDate,c.deliverTime)+"</div></div>"
    +"<div class='card-actions'><button class='sbtn bc2"+acBc+"' data-a='status' data-v='collecte'>&#128230; Collecte</button>"
    +"<button class='sbtn bl2"+acBl+"' data-a='status' data-v='livraison'>&#128666; Livraison</button>"
    +"<button class='sbtn bt2"+acBt+"' data-a='status' data-v='termine'>&#10003; Terminé</button>"
    +"<div style='display:flex;gap:4px'><button class='ibtn ed' data-a='edit'>&#9999;</button><button class='ibtn dl' data-a='del'>&#128465;</button></div></div>";
  return div;
}

document.getElementById("cards").addEventListener("click",function(e){
  var btn=e.target.closest("[data-a]");if(!btn)return;
  var id=btn.closest(".card").dataset.id;
  var c=clients.find(function(x){return x.id===id;});if(!c)return;
  if(btn.dataset.a==="status"){c.status=btn.dataset.v;render();pushClients();toast("Statut → "+btn.dataset.v);}
  else if(btn.dataset.a==="edit"){openModal(c);}
  else if(btn.dataset.a==="del"){if(confirm("Supprimer "+c.name+" ?")){clients=clients.filter(function(x){return x.id!==id;});render();pushClients();toast("Supprimé");}}
});

document.getElementById("pnav-prev").addEventListener("click",function(){weekOffset--;renderPlanning();});
document.getElementById("pnav-next").addEventListener("click",function(){weekOffset++;renderPlanning();});
document.getElementById("pnav-today").addEventListener("click",function(){weekOffset=0;renderPlanning();});

document.getElementById("filters").addEventListener("click",function(e){
  var tab=e.target.closest(".ftab");if(!tab)return;
  document.querySelectorAll(".ftab").forEach(function(t){t.classList.remove("active");});
  tab.classList.add("active");filter=tab.dataset.f;render();
});

function openModal(c){
  var today=todayISO();
  document.getElementById("fid").value=c?c.id:"";
  document.getElementById("fname").value=c?c.name:"";
  document.getElementById("faddr").value=c?(c.address||""):"";
  document.getElementById("fbags").value=c?(c.bags?""+c.bags:""):"";
  document.getElementById("fcol").value=c?(c.collectDate||today):today;
  document.getElementById("fcolh").value=c?(c.collectTime||""):"";
  document.getElementById("fdel").value=c?(c.deliverDate||""):"";
  document.getElementById("fdelh").value=c?(c.deliverTime||""):"";
  document.getElementById("fstat").value=c?c.status:"collecte";
  document.getElementById("fname").classList.remove("err");
  document.getElementById("mtitle").textContent=c?"Modifier le client":"Nouveau client";
  document.getElementById("modal").classList.add("open");
  setTimeout(function(){document.getElementById("fname").focus();},200);
}
function closeModal(){document.getElementById("modal").classList.remove("open");}
document.getElementById("fab").addEventListener("click",function(){openModal(null);});
document.getElementById("mbg").addEventListener("click",closeModal);
document.getElementById("fcancel").addEventListener("click",closeModal);

document.getElementById("fsave").addEventListener("click",function(){
  var nameEl=document.getElementById("fname");
  var name=nameEl.value.trim();
  if(!name){nameEl.classList.add("err");nameEl.focus();return;}
  nameEl.classList.remove("err");
  var id=document.getElementById("fid").value;
  var data={name:name,address:document.getElementById("faddr").value.trim(),bags:parseInt(document.getElementById("fbags").value,10)||0,collectDate:document.getElementById("fcol").value,collectTime:document.getElementById("fcolh").value,deliverDate:document.getElementById("fdel").value,deliverTime:document.getElementById("fdelh").value,status:document.getElementById("fstat").value};
  if(id){var idx=clients.findIndex(function(c){return c.id===id;});if(idx!==-1)clients[idx]=Object.assign({},clients[idx],data);toast("Mis à jour ✔");}
  else{data.id=uid();clients.push(data);toast("Client ajouté ✔");}
  render();pushClients();closeModal();
});

function toast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  setTimeout(function(){el.classList.remove("show");},2200);
}

fetchClients();
setInterval(function(){if(!pending)fetchClients();},3600000); // 1 heure
</script>
